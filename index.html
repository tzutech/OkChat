        }
        blockedHtml += '</div>';
        
        let reportsHtml = '<div class="admin-list" style="max-height:150px;">';
        if (reports.length === 0) {
            reportsHtml += '<div style="color:#7a6a9a; text-align:center;">No hay denuncias pendientes</div>';
        } else {
            reports.forEach((report, idx) => {
                reportsHtml += `
                    <div class="admin-item" style="flex-direction:column; align-items:flex-start;">
                        <div><strong style="color:#f87171;">${escapeHtml(report.reportedUser)}</strong> denunciado por <strong>${escapeHtml(report.reporterName)}</strong></div>
                        <div style="font-size:0.7rem; color:#9b8bb5;">Motivo: ${escapeHtml(report.reason)}</div>
                        <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
                            <button class="resolve-report" data-index="${idx}" style="background:#22c55e; border:none; padding:4px 12px; border-radius:20px; color:white; font-size:0.7rem;">✅ Resolver</button>
                            <button class="block-from-report" data-userid="${report.reportedUserId}" data-username="${escapeHtml(report.reportedUser)}" style="background:#7c2d2d; border:none; padding:4px 12px; border-radius:20px; color:white; font-size:0.7rem;">🚫 Bloquear</button>
                            <button class="make-mod-from-report" data-userid="${report.reportedUserId}" data-username="${escapeHtml(report.reportedUser)}" style="background:#7c3aed; border:none; padding:4px 12px; border-radius:20px; color:white; font-size:0.7rem;">👑 Hacer MOD</button>
                        </div>
                    </div>
                `;
            });
        }
        reportsHtml += '</div>';
        
        modal.innerHTML = `
            <div class="modal-card" style="max-width: 450px; max-height: 80vh; overflow-y: auto;">
                <h2>👑 Panel de Moderador</h2>
                
                <hr style="margin: 16px 0; border-color: #4a3a6e;">
                <h3 style="color:#c084fc;">👑 Moderadores</h3>
                ${moderadoresHtml}
                
                <hr style="margin: 16px 0; border-color: #4a3a6e;">
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <input type="text" id="newModName" placeholder="Nombre para hacer MOD" style="flex:1; text-align:left;">
                    <button id="addModBtn" style="width: auto; padding: 12px 16px;">👑 Hacer MOD</button>
                </div>
                
                <hr style="margin: 16px 0; border-color: #4a3a6e;">
                <h3 style="color:#c084fc;">🚫 Usuarios Bloqueados</h3>
                ${blockedHtml}
                
                <hr style="margin: 16px 0; border-color: #4a3a6e;">
                <h3 style="color:#c084fc;">📋 Denuncias Pendientes</h3>
                ${reportsHtml}
                
                <hr style="margin: 16px 0; border-color: #4a3a6e;">
                <button id="closeAdminPanel" class="secondary">❌ Cerrar</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        modal.querySelectorAll('.remove-mod').forEach(btn => {
            btn.onclick = () => {
                removeModerator(btn.dataset.userid);
                modal.remove();
                mostrarPanelAdmin();
            };
        });
        
        modal.querySelectorAll('.unblock').forEach(btn => {
            btn.onclick = () => {
                unblockUser(btn.dataset.userid);
                modal.remove();
                mostrarPanelAdmin();
            };
        });
        
        modal.querySelectorAll('.resolve-report').forEach(btn => {
            btn.onclick = () => {
                reports.splice(parseInt(btn.dataset.index), 1);
                localStorage.setItem('okchat_reports', JSON.stringify(reports));
                modal.remove();
                mostrarPanelAdmin();
            };
        });
        
        modal.querySelectorAll('.block-from-report').forEach(btn => {
            btn.onclick = () => {
                blockUser(btn.dataset.userid, btn.dataset.username, 'Denunciado por comunidad');
                modal.remove();
                mostrarPanelAdmin();
            };
        });
        
        modal.querySelectorAll('.make-mod-from-report').forEach(btn => {
            btn.onclick = () => {
                addModerator(btn.dataset.userid, btn.dataset.username);
                modal.remove();
                mostrarPanelAdmin();
            };
        });
        
        modal.querySelector('#addModBtn').onclick = () => {
            const name = modal.querySelector('#newModName').value.trim();
            if (name) {
                addModerator('manual_' + Date.now(), name);
                modal.remove();
                mostrarPanelAdmin();
            }
        };
        
        modal.querySelector('#closeAdminPanel').onclick = () => modal.remove();
    }
    
    function mostrarPasswordModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card">
                <h2>🔐 Acceso Administrador</h2>
                <p>Ingresa la clave de administrador</p>
                <input type="password" id="adminPassword" placeholder="Clave de administrador">
                <button id="submitPasswordBtn">✅ Verificar</button>
                <button id="cancelPasswordBtn" class="secondary">❌ Cancelar</button>
                <div id="passwordError" class="error-text"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const passwordInput = modal.querySelector('#adminPassword');
        const submitBtn = modal.querySelector('#submitPasswordBtn');
        const cancelBtn = modal.querySelector('#cancelPasswordBtn');
        const errorMsg = modal.querySelector('#passwordError');
        
        const verificar = () => {
            const password = passwordInput.value.trim();
            if (password === ADMIN_KEY) {
                modal.remove();
                mostrarPanelAdmin();
            } else {
                errorMsg.innerText = 'Clave incorrecta';
                passwordInput.value = '';
                passwordInput.focus();
            }
        };
        
        submitBtn.onclick = verificar;
        cancelBtn.onclick = () => modal.remove();
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificar();
        });
        passwordInput.focus();
    }
    
    // ========== ESTADO GLOBAL ==========
    let currentUser = null;
    let currentRoom = 'general';
    let roomPasswords = new Map();
    let roomCreators = new Map();
    roomPasswords.set('general', null);
    roomCreators.set('general', 'system');
    
    let socketConnection = null;
    let isChatReady = false;
    
    const chatContainer = document.getElementById('chatContainer');
    const messagesContainer = document.getElementById('messagesList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusSpan = document.getElementById('connectionStatus');
    const currentRoomNameSpan = document.getElementById('currentRoomName');
    const changeRoomBtn = document.getElementById('changeRoomBtn');
    const deleteRoomBtn = document.getElementById('deleteRoomBtn');
    const adminBtn = document.getElementById('adminBtn');
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.style.cssText = 'text-align: center; font-size: 0.7rem; color: #a855f7; margin: 8px 0; background: #2a2340; padding: 4px 10px; border-radius: 20px; width: fit-content; max-width: 90%; margin-left: auto; margin-right: auto;';
        div.innerText = text;
        messagesContainer.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    function addChatMessage(text, userName, userId, isOwn, isMod = false, messageId = null) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const modTag = isMod ? ' <span class="mod-tag">MOD</span>' : '';
        const msgId = messageId || Date.now().toString() + Math.random().toString(36).substr(2, 6);
        div.setAttribute('data-msg-id', msgId);
        div.setAttribute('data-user-id', userId);
        div.setAttribute('data-user-name', userName);
        
        div.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="message-meta">
                <span>${escapeHtml(userName)}${modTag}</span>
                <span>${time}</span>
            </div>
            <div class="message-actions">
                <button class="report-btn" data-user-id="${userId}" data-user-name="${escapeHtml(userName)}">🚩 Denunciar</button>
            </div>
        `;
        messagesContainer.appendChild(div);
        
        const reportBtn = div.querySelector('.report-btn');
        reportBtn.onclick = () => mostrarReportModal(userId, userName);
        
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    function mostrarReportModal(reportedUserId, reportedUserName) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card">
                <h2>🚩 Denunciar usuario</h2>
                <p>Usuario: <strong>${escapeHtml(reportedUserName)}</strong></p>
                <textarea id="reportReason" rows="3" placeholder="Motivo de la denuncia..."></textarea>
                <button id="submitReportBtn">✅ Enviar denuncia</button>
                <button id="cancelReportBtn" class="secondary">❌ Cancelar</button>
                <div id="reportError" class="error-text"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const submitBtn = modal.querySelector('#submitReportBtn');
        const cancelBtn = modal.querySelector('#cancelReportBtn');
        const reasonTextarea = modal.querySelector('#reportReason');
        const errorMsg = modal.querySelector('#reportError');
        
        submitBtn.onclick = () => {
            const reason = reasonTextarea.value.trim();
            if (!reason) {
                errorMsg.innerText = 'Por favor ingresa un motivo';
                return;
            }
            addReport(reportedUserName, reportedUserId, reason, currentUser.name);
            addSystemMessage(`📋 Denuncia enviada contra ${reportedUserName}`);
            modal.remove();
        };
        
        cancelBtn.onclick = () => modal.remove();
    }
    
    function getRoomCount() {
        let count = 0;
        for (let name of roomPasswords.keys()) {
            if (name !== 'general') count++;
        }
        return count;
    }
    
    function canDeleteRoom(roomName) {
        if (roomName === 'general') return false;
        const creatorId = roomCreators.get(roomName);
        return isUserModerator(currentUser.id) || creatorId === currentUser.id;
    }
    
    function deleteRoom(roomName) {
        if (roomName === 'general') {
            addSystemMessage('❌ No se puede borrar la sala general');
            return false;
        }
        if (!canDeleteRoom(roomName)) {
            addSystemMessage('❌ Solo el creador de la sala o un moderador puede borrarla');
            return false;
        }
        if (currentRoom === roomName) changeRoom('general', null);
        roomPasswords.delete(roomName);
        roomCreators.delete(roomName);
        socketConnection.send({ type: 'room_deleted', roomName: roomName, userId: currentUser.id });
        addSystemMessage(`🗑️ La sala "${roomName}" ha sido eliminada`);
        return true;
    }
    
    function changeRoom(roomName, password = null) {
        if (!socketConnection || !isChatReady) return false;
        const storedPass = roomPasswords.get(roomName);
        if (storedPass !== undefined && storedPass !== null && storedPass !== password) {
            addSystemMessage(`🔐 ${t.wrongPassword} para "${roomName}"`);
            return false;
        }
        currentRoom = roomName;
        currentRoomNameSpan.innerText = roomName;
        deleteRoomBtn.disabled = !canDeleteRoom(roomName);
        socketConnection.send({ type: 'room_change', alias: currentUser.name, userId: currentUser.id, isMod: isUserModerator(currentUser.id), newRoom: roomName });
        addSystemMessage(`📡 ${t.roomChanged}: ${roomName}`);
        return true;
    }
    
    function createRoom(roomName, password = null) {
        if (!roomName || roomName.trim() === '') return false;
        const cleanName = roomName.trim().toLowerCase().replace(/[^a-z0-9_\-]/g, '');
        if (cleanName === '') return false;
        if (cleanName === 'general') {
            addSystemMessage('❌ No puedes crear una sala llamada "general"');
            return false;
        }
        const currentRoomCount = getRoomCount();
        if (currentRoomCount >= MAX_ROOMS && !roomPasswords.has(cleanName)) {
            addSystemMessage(`❌ Límite de ${MAX_ROOMS} salas alcanzado. Borra una sala existente antes de crear otra.`);
            return false;
        }
        if (!roomPasswords.has(cleanName)) {
            roomPasswords.set(cleanName, password || null);
            roomCreators.set(cleanName, currentUser.id);
            addSystemMessage(`✅ ${t.roomCreated}: ${cleanName}`);
            changeRoom(cleanName, password || null);
            return true;
        } else {
            addSystemMessage(`⚠️ La sala "${cleanName}" ya existe`);
            return false;
        }
    }
    
    function showRoomModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        let roomsHtml = '<div class="room-list">';
        for (let [name, pass] of roomPasswords.entries()) {
            const lockIcon = pass ? '🔒' : '🔓';
            const passText = pass ? t.privateRoom : t.publicRoom;
            const creator = roomCreators.get(name);
            const canDelete = (isUserModerator(currentUser.id) || creator === currentUser.id) && name !== 'general';
            roomsHtml += `<div class="room-item" data-room="${name}" data-pass="${pass || ''}"><div><span class="room-name">${escapeHtml(name)}</span><div class="room-creator">${canDelete ? '👑 Puedes borrarla' : ''}</div></div><span class="room-lock">${lockIcon} ${passText}</span></div>`;
        }
        roomsHtml += '</div>';
        modal.innerHTML = `<div class="modal-card"><h2>🚪 ${t.joinRoom}</h2>${roomsHtml}<div class="create-room-section"><h3>➕ ${t.createRoom}</h3><input type="text" id="newRoomName" placeholder="${t.roomName}" maxlength="30"><input type="password" id="newRoomPass" placeholder="${t.passwordOptional}"><button id="createBtn">✅ ${t.create}</button></div><button id="closeModal" style="margin-top:16px; background:#4a3a6e;">❌ ${t.cancel}</button></div>`;
        document.body.appendChild(modal);
        modal.querySelectorAll('.room-item').forEach(el => {
            el.addEventListener('click', () => {
                const room = el.dataset.room;
                const passNeeded = el.dataset.pass;
                if (passNeeded && passNeeded !== 'null' && passNeeded !== '') {
                    const passModal = document.createElement('div');
                    passModal.className = 'modal-overlay';
                    passModal.innerHTML = `<div class="modal-card"><h2>🔐 ${t.passwordRequired}</h2><input type="password" id="roomPass" placeholder="${t.enterPassword}"><button id="submitPass">✅ ${t.joinRoom}</button><button id="cancelPass" style="margin-top:8px; background:#4a3a6e;">❌ ${t.cancel}</button></div>`;
                    document.body.appendChild(passModal);
                    passModal.querySelector('#submitPass').onclick = () => {
                        const pwd = passModal.querySelector('#roomPass').value;
                        if (pwd === passNeeded) { modal.remove(); passModal.remove(); changeRoom(room, pwd); }
                        else { addSystemMessage(`❌ ${t.wrongPassword}`); passModal.remove(); }
                    };
                    passModal.querySelector('#cancelPass').onclick = () => passModal.remove();
                } else { changeRoom(room, null); modal.remove(); }
            });
        });
        modal.querySelector('#createBtn').onclick = () => {
            const newName = modal.querySelector('#newRoomName').value.trim();
            const newPass = modal.querySelector('#newRoomPass').value.trim() || null;
            if (newName) { createRoom(newName, newPass); modal.remove(); }
        };
        modal.querySelector('#closeModal').onclick = () => modal.remove();
    }
    
    function initChat() {
        const channel = connect('okchat-v33', { as: currentUser.id });
        socketConnection = channel;
        channel.on('open', () => {
            isChatReady = true;
            statusSpan.innerText = t.connected;
            statusSpan.style.color = '#c084fc';
            addSystemMessage(`🟢 ${currentUser.name}${isUserModerator(currentUser.id) ? ' [MODERADOR]' : ''} ${t.joinMsg}`);
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
            deleteRoomBtn.disabled = !canDeleteRoom(currentRoom);
        });
        channel.on('message', (payload) => {
            if (payload && typeof payload === 'object') {
                if (payload.type === 'chat_msg' && payload.room === currentRoom && payload.userId !== currentUser.id && !isUserBlocked(payload.userId)) {
                    addChatMessage(payload.text, payload.alias, payload.userId, false, payload.isMod, payload.msgId);
                }
                else if (payload.type === 'register_user' && payload.userId !== currentUser.id && payload.room === currentRoom && !isUserBlocked(payload.userId)) {
                    addSystemMessage(`✨ ${payload.alias}${payload.isMod ? ' [MOD]' : ''} ${t.joinMsg}`);
                }
                else if (payload.type === 'user_left' && payload.userId !== currentUser.id && payload.room === currentRoom) {
                    addSystemMessage(`👋 ${payload.alias} ${t.leftMsg}`);
                }
                else if (payload.type === 'room_change' && payload.userId !== currentUser.id && payload.newRoom === currentRoom && !isUserBlocked(payload.userId)) {
                    addSystemMessage(`✨ ${payload.alias}${payload.isMod ? ' [MOD]' : ''} ${t.joinMsg} a ${payload.newRoom}`);
                }
                else if (payload.type === 'room_deleted' && payload.roomName === currentRoom) {
                    addSystemMessage(`⚠️ La sala "${payload.roomName}" ha sido eliminada. Serás movido a general.`);
                    changeRoom('general', null);
                }
            }
        });
        channel.on('close', () => { isChatReady = false; statusSpan.innerText = t.disconnected; statusSpan.style.color = '#f87171'; });
        channel.on('leave', () => { socketConnection?.send({ type: 'user_left', alias: currentUser.name, userId: currentUser.id, room: currentRoom }); });
        socketConnection.send({ type: 'register_user', alias: currentUser.name, userId: currentUser.id, isMod: isUserModerator(currentUser.id), room: currentRoom });
    }
    
    function sendMessage() {
        if (!isChatReady || !socketConnection) { addSystemMessage('⌛ Conectando...'); return; }
        if (isUserBlocked(currentUser.id)) { addSystemMessage(`⛔ ${t.blockedByMod}`); return; }
        if (checkSpam()) { addSystemMessage(`⚠️ ${t.spamWarning}`); return; }
        const raw = messageInput.value.trim();
        if (!raw) return;
        if (containsBadWords(raw)) { addSystemMessage('⚠️ Mensaje bloqueado por lenguaje inapropiado'); messageInput.value = ''; return; }
        const censoredMsg = censorText(escapeHtml(raw));
        const msgId = Date.now().toString() + Math.random().toString(36).substr(2, 6);
        socketConnection.send({ type: 'chat_msg', text: censoredMsg, alias: currentUser.name, userId: currentUser.id, isMod: isUserModerator(currentUser.id), room: currentRoom, msgId: msgId });
        addChatMessage(censoredMsg, currentUser.name, currentUser.id, true, isUserModerator(currentUser.id), msgId);
        messageInput.value = '';
        messageInput.focus();
    }
    
    function handleDeleteRoom() {
        if (canDeleteRoom(currentRoom)) {
            if (confirm(`¿Seguro que quieres borrar la sala "${currentRoom}"? Esta acción no se puede deshacer.`)) deleteRoom(currentRoom);
        } else { addSystemMessage('❌ No tienes permiso para borrar esta sala'); }
    }
    
    // Pantalla de bienvenida
    function showWelcomeModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><h2>✅ OkChat</h2><p>Chat con salas · Crea la sala que quieras</p><input type="text" id="userName" placeholder="Tu nombre" maxlength="24" autocomplete="off"><select id="langSelect"><option value="es">🇪🇸 Español</option><option value="en">🇬🇧 English</option><option value="pt">🇵🇹 Português</option><option value="fr">🇫🇷 Français</option></select><button id="enterBtn">🚀 Entrar al chat</button><div id="errorMsg" class="error-text"></div></div>`;
        document.body.appendChild(modal);
        const enterBtn = document.getElementById('enterBtn');
        const nameInput = document.getElementById('userName');
        const langSelect = document.getElementById('langSelect');
        const errorMsg = document.getElementById('errorMsg');
        enterBtn.onclick = () => {
            let name = nameInput.value.trim();
            if (!name) { errorMsg.innerText = 'Por favor ingresa un nombre'; return; }
            if (name.length < 2) { errorMsg.innerText = 'El nombre debe tener al menos 2 caracteres'; return; }
            if (containsBadWords(name)) { errorMsg.innerText = 'Nombre no permitido. Elige otro.'; return; }
            const lang = langSelect.value;
            setLanguage(lang);
            const userId = Date.now().toString() + Math.random().toString(36).substr(2, 8);
            currentUser = { id: userId, name: name };
            modal.remove();
            chatContainer.style.display = 'flex';
            initChat();
        };
        nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enterBtn.click(); });
        nameInput.focus();
    }
    
    adminBtn.onclick = () => { mostrarPasswordModal(); };
    
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    changeRoomBtn.onclick = showRoomModal;
    deleteRoomBtn.onclick = handleDeleteRoom;
    showWelcomeModal();
</script>
</body>
</html>
